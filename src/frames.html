<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מסגרות</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://oryan-hassidim.github.io/rashmats/blob/alpine-combobox.js?c"></script>
    <?!= include('CSS'); ?>
</head>

<body>
    <?!= navbar('frames'); ?>
    <main x-data="vm()">
        <h1>מסגרות</h1>
        <button class="refresh-button" @click="updateData()">רענן</button>
        <button class="open-add-frame" @click="addFrame">מסגרת חדשה</button>

        <dialog id="edit-frame-dialog" x-ref="editFrameDialog">
            <h2 x-text="selectedFrame.id === -1 ? 'מסגרת חדשה' : 'ערוך מסגרת'"></h2>
            <p x-show="loading">טוען...</p>
            <form @submit.prevent="submitFrame" x-show="!loading">
                <label>
                    שם:
                    <input type="text" x-model="selectedFrame.name" required>
                </label>
                <label>
                    מזהה מפקד:
                    <alpine-combobox list="soldiers" selected-item="selectedFrame.commander" key-prop="id"
                        display-prop="name" placeholder="בחר מפקד...">
                    </alpine-combobox>
                </label>
                <button type="submit" x-text="selectedFrame.id === -1 ? 'הוסף' : 'שמור'"></button>
            </form>
            <button commandfor="edit-frame-dialog" command="close">Close</button>
        </dialog>
        <table>
            <thead>
                <tr>
                    <th>
                        <div>מזהה</div>
                    </th>
                    <th>
                        <div>שם</div>
                    </th>
                    <th>
                        <div>מפקד</div>
                    </th>
                    <th>
                        <div>חיילים</div>
                    </th>
                    <th>
                        <div>פעולות</div>
                    </th>
                </tr>
            </thead>
            <tbody x-show="!loading">
                <template x-for="frame in frames" :key="frame.id">
                    <tr>
                        <td x-text="frame.id"></td>
                        <td x-text="frame.name"></td>
                        <td x-text="frame.commander?.name"></td>
                        <td x-text="soldiers?.filter(s => s.frameId === frame.id).length || 0"></td>
                        <td>
                            <button @click="editFrame(frame)">ערוך</button>
                            <button @click="deleteFrame(frame)"
                                :disabled="frame.soldiers?.filter(s => s.frameId === frame.id).length > 0">מחק</button>
                        </td>
                    </tr>
                </template>
            </tbody>
            <tbody x-show="loading">
                <tr>
                    <td colspan="5" class="loading">טוען...</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>

<?!= include('JS'); ?>

<script>
    const FRAMES_STRING = 'מסגרות';
    const SOLDIERS_STRING = 'כוח אדם';
    const ID_STRING = 'מזהה';
    const NAME_STRING = 'שם';
    const COMMANDER_ID_STRING = 'מזהה מפקד';

    function vm() {
        //  *מסגרות*:
        // - מזהה
        // - שם
        // - מזהה מפקד

        //  *כוח אדם*:
        // - מזהה
        // - שם פרטי
        // - שם משפחה
        // - מספר נייד
        // - מזהה מסגרת

        return {
            frames: [],
            soldiers: [],
            selectedFrame: {
                id: -1,
                name: '',
                commander: null,
            },
            loading: false,
            identity: {
                email: null,
                id: null,
                name: null
            },

            async init() {
                await this.updateData();
            },

            async updateData() {
                this.loading = true;
                try {
                    const [frames, soldiers] = await Promise.all([
                        server.getData(FRAMES_STRING),
                        server.getData(SOLDIERS_STRING)
                    ]);
                    this.soldiers = soldiers.slice(1).map(soldier => {
                        return {
                            id: soldier[0],
                            name: soldier[1] + ' ' + soldier[2],
                            frameId: soldier[4],
                        };
                    });
                    this.frames = frames.slice(1).map(frame => {
                        return {
                            id: frame[0],
                            name: frame[1],
                            commander: frame[2] ? this.soldiers.find(s => s.id === frame[2]) || null : null,
                        };
                    });
                } catch (error) {
                    console.error('Error fetching frames:', error);
                } finally {
                    this.loading = false;
                }
            },

            async submitFrame() {
                console.log('Submitting frame:', this.selectedFrame);
                if (!this.selectedFrame.name) {
                    alert('אנא מלא את כל השדות');
                    return;
                }
                this.loading = true;
                if (this.selectedFrame.id === -1) {
                    try {
                        this.selectedFrame.id = this.frames.length > 0 ? Math.max(...this.frames.map(f => f.id)) + 1 : 1;
                        await server.appendRow(FRAMES_STRING, [this.selectedFrame.id, this.selectedFrame.name, this.selectedFrame.commander?.id || null]);
                    } catch (error) {
                        console.error('Error adding frame: ' + error);
                        return;
                    } finally {
                        this.loading = false;
                    }
                } else {
                    try {
                        const update = {
                            [ID_STRING]: this.selectedFrame.id,
                            [NAME_STRING]: this.selectedFrame.name,
                            [COMMANDER_ID_STRING]: this.selectedFrame.commander?.id || null
                        };
                        console.log('Updating frame with data:', update);
                        await server.editRows(FRAMES_STRING, [update]);
                    } catch (error) {
                        console.error('Error updating frame: ' + error);
                        return;
                    } finally {
                        this.loading = false;
                    }
                }
                this.$refs.editFrameDialog.close();
                this.selectedFrame.id = -1;
                this.selectedFrame.name = '';
                this.selectedFrame.commander = null;
                await this.updateData();
            },

            addFrame() {
                this.selectedFrame = {
                    id: -1,
                    name: '',
                    commander: null,
                };
                this.$refs.editFrameDialog.showModal();
            },

            editFrame(frame) {
                this.selectedFrame = { ...frame };
                this.$refs.editFrameDialog.showModal();
            },

            async deleteFrame(frame) {
                if (frame.soldiers?.filter(s => s.frameId === frame.id).length > 0) {
                    alert('לא ניתן למחוק מסגרת שיש לה חיילים');
                    return;
                }
                if (!confirm('האם אתה בטוח שברצונך למחוק את המסגרת הזו?')) {
                    return;
                }
                this.loading = true;
                try {
                    await server.deleteRow(FRAMES_STRING, frame.id);
                } catch (error) {
                    console.error('Error deleting frame:', error);
                    return;
                } finally {
                    this.loading = false;
                }
                await this.updateData();
            },
        };
    }
</script>

</html>
